version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sms-postgres
    environment:
      POSTGRES_DB: sms_db
      POSTGRES_USER: sms_user
      POSTGRES_PASSWORD: sms_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms_user -d sms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sms-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sms_db
      SPRING_DATASOURCE_USERNAME: sms_user
      SPRING_DATASOURCE_PASSWORD: sms_password
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
