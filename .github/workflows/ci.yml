name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sms_db
          POSTGRES_USER: sms_user
          POSTGRES_PASSWORD: sms_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sms_user -d sms_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: mvn test -Dspring.profiles.active=test -B

      - name: Run all tests with DB
        run: mvn verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/sms_db
          SPRING_DATASOURCE_USERNAME: sms_user
          SPRING_DATASOURCE_PASSWORD: sms_password

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build package
        run: mvn package -DskipTests -B

      - name: Build Docker image
        run: docker build -t sms-app:latest .
