<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS - Edit Student</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">SMS - Teacher</div>
        <div class="nav-links">
            <a href="/teacher/home">Home</a>
            <a href="/teacher/students">Students</a>
            <a href="/teacher/courses">Courses</a>
            <a href="/teacher/departments">Departments</a>
            <a href="/teacher/teachers">Teachers</a>
            <a href="/teacher/profile">My Profile</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-link">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h2>Edit Student</h2>
            <form th:action="@{/teacher/students/edit/{id}(id=${student.id})}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:value="${student.username}" disabled>
                </div>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" th:value="${student.fullName}" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" th:value="${student.email}">
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone" th:value="${student.phone}">
                </div>
                <div class="form-group">
                    <label for="departmentId">Department</label>
                    <select id="departmentId" name="departmentId">
                        <option value="">-- Select --</option>
                        <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"
                                th:selected="${student.department != null and student.department.id == dept.id}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/teacher/students" class="btn">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
