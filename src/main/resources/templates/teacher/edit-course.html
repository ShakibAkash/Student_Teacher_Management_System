<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS - Edit Course</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">SMS - Teacher</div>
        <div class="nav-links">
            <a href="/teacher/home">Home</a>
            <a href="/teacher/students">Students</a>
            <a href="/teacher/courses">Courses</a>
            <a href="/teacher/departments">Departments</a>
            <a href="/teacher/teachers">Teachers</a>
            <a href="/teacher/profile">My Profile</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-link">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h2>Edit Course</h2>
            <form th:action="@{/teacher/courses/edit/{id}(id=${course.id})}" method="post">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" th:value="${course.name}" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" th:value="${course.description}">
                </div>
                <div class="form-group">
                    <label for="credits">Credits</label>
                    <input type="number" id="credits" name="credits" th:value="${course.credits}" min="1">
                </div>
                <div class="form-group">
                    <label for="departmentId">Department</label>
                    <select id="departmentId" name="departmentId">
                        <option value="">-- Select --</option>
                        <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"
                                th:selected="${course.department != null and course.department.id == dept.id}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="teacherId">Teacher</label>
                    <select id="teacherId" name="teacherId">
                        <option value="">-- Select --</option>
                        <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.fullName}"
                                th:selected="${course.teacher != null and course.teacher.id == t.id}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/teacher/courses" class="btn">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
