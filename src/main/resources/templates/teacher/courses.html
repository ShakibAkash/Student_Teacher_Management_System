<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS - Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">SMS - Teacher</div>
        <div class="nav-links">
            <a href="/teacher/home">Home</a>
            <a href="/teacher/students">Students</a>
            <a href="/teacher/courses">Courses</a>
            <a href="/teacher/departments">Departments</a>
            <a href="/teacher/teachers">Teachers</a>
            <a href="/teacher/profile">My Profile</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-link">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <h1>Courses</h1>

        <div th:if="${param.added}" class="alert alert-success">Course added successfully!</div>
        <div th:if="${param.updated}" class="alert alert-success">Course updated successfully!</div>
        <div th:if="${param.deleted}" class="alert alert-success">Course deleted successfully!</div>

        <!-- Add Course Form -->
        <div class="form-card" style="margin-bottom: 2rem;">
            <h3>Add New Course</h3>
            <form th:action="@{/teacher/courses/add}" method="post" class="inline-form">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description">
                </div>
                <div class="form-group">
                    <label for="credits">Credits</label>
                    <input type="number" id="credits" name="credits" min="1">
                </div>
                <div class="form-group">
                    <label for="departmentId">Department</label>
                    <select id="departmentId" name="departmentId">
                        <option value="">-- Select --</option>
                        <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="teacherId">Teacher</label>
                    <select id="teacherId" name="teacherId">
                        <option value="">-- Select --</option>
                        <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.fullName}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Add Course</button>
            </form>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Credits</th>
                    <th>Department</th>
                    <th>Teacher</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="course : ${courses}">
                    <td th:text="${course.id}"></td>
                    <td th:text="${course.name}"></td>
                    <td th:text="${course.description}"></td>
                    <td th:text="${course.credits}"></td>
                    <td th:text="${course.department != null ? course.department.name : 'N/A'}"></td>
                    <td th:text="${course.teacher != null ? course.teacher.fullName : 'N/A'}"></td>
                    <td>
                        <a th:href="@{/teacher/courses/edit/{id}(id=${course.id})}" class="btn btn-sm">Edit</a>
                        <form th:action="@{/teacher/courses/delete/{id}(id=${course.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this course?')">Delete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(courses)}">
                    <td colspan="7">No courses found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
